runtime: python310

services:
  - type: web
    name: sales-analytics-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        scope: shared

  - type: postgres
    name: sales-analytics-db
    plan: free
